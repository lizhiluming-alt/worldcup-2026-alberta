<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>世界杯观赛 · Alberta</title>
<style>
  :root{
    --bg:#0b1220; --card:#141d31; --card2:#1b263f; --line:#26324d;
    --txt:#eef2fb; --dim:#8a98b8; --accent:#36d399; --live:#ff4d6d;
    --gold:#f5c451; --pre:#5b9bff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:linear-gradient(180deg,#0b1220,#0c1426); color:var(--txt);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
       padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px)}
  header{position:sticky; top:0; z-index:10; backdrop-filter:blur(12px);
         background:rgba(11,18,32,.88); border-bottom:1px solid var(--line); padding:12px 16px 0}
  h1{margin:0; font-size:17px; letter-spacing:.3px; display:flex; align-items:center; gap:8px}
  .tz{color:var(--dim); font-size:12px; margin-top:2px}
  .tabs{display:flex; gap:4px; margin-top:10px}
  .tabs button{flex:1; background:none; color:var(--dim); border:none; border-bottom:2px solid transparent;
      padding:10px 4px 11px; font-size:14px; font-weight:600; cursor:pointer}
  .tabs button.on{color:var(--txt); border-bottom-color:var(--accent)}
  .nav{display:flex; align-items:center; gap:8px; padding:10px 0}
  .nav button{background:var(--card2); color:var(--txt); border:1px solid var(--line);
      border-radius:10px; padding:7px 12px; font-size:15px; cursor:pointer; min-width:40px}
  .nav button:active{transform:scale(.96)}
  .nav .day{flex:1; text-align:center}
  .nav .day .d{font-size:15px; font-weight:600}
  .nav .day .sub{font-size:12px; color:var(--dim)}
  #today{font-size:13px; padding:7px 10px}
  main{max-width:680px; margin:0 auto; padding:12px 12px 0}
  .empty{color:var(--dim); text-align:center; padding:60px 20px; font-size:15px}
  .dhead{position:sticky; top:0; z-index:4; background:rgba(12,20,38,.95); backdrop-filter:blur(8px);
         margin:0 -12px; padding:9px 14px; border-bottom:1px solid var(--line);
         display:flex; justify-content:space-between; align-items:baseline}
  .dhead.first{border-top:none}
  .dhead .dt{font-size:14px; font-weight:700}
  .dhead .rd{font-size:12px; color:var(--gold)}
  .dhead.todayhead .dt{color:var(--accent)}
  .match{background:var(--card); border:1px solid var(--line); border-radius:16px;
         padding:13px 14px 11px; margin:10px 0; position:relative; overflow:hidden}
  .match.live{border-color:var(--live); box-shadow:0 0 0 1px var(--live) inset}
  .toprow{display:flex; justify-content:space-between; align-items:center; margin-bottom:9px}
  .kickoff{font-size:13px; color:var(--dim); font-variant-numeric:tabular-nums}
  .rbadge{font-size:11px; color:var(--gold); border:1px solid rgba(245,196,81,.35);
          border-radius:6px; padding:1px 6px; margin-left:7px}
  .status{font-size:12px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.3px}
  .status.pre{background:rgba(91,155,255,.15); color:var(--pre)}
  .status.post{background:rgba(54,211,153,.15); color:var(--accent)}
  .status.live{background:var(--live); color:#fff; animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .teams{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:6px}
  .team{display:flex; align-items:center; gap:9px; min-width:0}
  .team.away{flex-direction:row-reverse; text-align:right}
  .team img{width:28px; height:28px; object-fit:contain; flex:0 0 28px}
  .team .nm{font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .team.win .nm{color:var(--gold)}
  .score{font-size:25px; font-weight:800; font-variant-numeric:tabular-nums; min-width:60px;
         text-align:center; letter-spacing:1px}
  .score .sep{color:var(--dim); font-weight:500; margin:0 2px}
  .score.dim{color:var(--dim); font-size:18px; font-weight:600}
  .clock{text-align:center; font-size:12px; color:var(--live); font-weight:700; margin-top:6px}
  .clock.ft{color:var(--accent)}
  .meta{margin-top:9px; padding-top:8px; border-top:1px solid var(--line);
        font-size:12px; color:var(--dim)}
  .updated{text-align:center; color:var(--dim); font-size:11px; padding:10px 0 0}
  .updated b{color:var(--accent)}
  .loading{text-align:center; color:var(--dim); padding:50px 0; font-size:14px}
  .expand{margin-top:9px; text-align:center; cursor:pointer; user-select:none}
  .exlabel{font-size:12px; color:var(--pre)}
  .detail{display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
  .detail.open{display:block}
  .dloading{color:var(--dim); font-size:13px; text-align:center; padding:8px}
  .otitle{font-size:12px; color:var(--dim); margin-bottom:5px}
  .odds{margin-bottom:12px}
  .orow{display:flex; gap:8px}
  .ocell{flex:1; background:var(--card2); border:1px solid var(--line); border-radius:10px; padding:8px 4px; text-align:center}
  .ocell .ol{font-size:11px; color:var(--dim)}
  .ocell .ov{font-size:17px; font-weight:800; color:var(--gold); font-variant-numeric:tabular-nums}
  .goal{font-size:13px; padding:5px 0; line-height:1.4}
  .goal .gm{display:inline-block; min-width:38px; color:var(--accent); font-weight:700; font-variant-numeric:tabular-nums}
  .goal b{font-weight:600}
  .goal .gt{color:var(--dim); font-size:12px; margin-left:3px}
  .goal .gas{color:var(--dim); font-size:12px}
  .goal .gk{color:var(--gold); font-size:11px; border:1px solid rgba(245,196,81,.3); border-radius:4px; padding:0 4px; margin-left:3px}
  .gbadge{font-size:11px; color:var(--pre); border:1px solid rgba(91,155,255,.4);
          border-radius:6px; padding:1px 6px; margin-left:6px}
  .gblock{margin-bottom:18px}
  .stab{width:100%; border-collapse:collapse; font-size:13px; margin-top:4px}
  .stab th{color:var(--dim); font-weight:600; font-size:11px; text-align:center; padding:6px 4px; border-bottom:1px solid var(--line)}
  .stab td{text-align:center; padding:7px 4px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums}
  .stab td.tm{text-align:left; display:flex; align-items:center; gap:7px; font-weight:600}
  .stab td.tm img{width:20px; height:20px; object-fit:contain}
  .stab td.pt{font-weight:800; color:var(--gold)}
  .stab td.r{color:var(--dim); width:18px}
  .stab tr.hl td{background:rgba(91,155,255,.12)}
  .stab tr.q td.r{color:var(--accent)}
  .stab tr.q3 td.r{color:var(--gold)}
  .smini{margin-top:6px}
  .smini .otitle{margin-bottom:2px}
  .src{text-align:center; color:var(--dim); font-size:11px; padding:14px 0 0; opacity:.7}
  .tzsel{background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:8px;
         font-size:12px; padding:3px 6px; margin-left:4px}
  /* ===== 竞技场 race view ===== */
  .racehint{font-size:12px; color:#9be8c9; margin:4px 0 2px} .racehint b{color:var(--gold)}
  .racefav{display:flex; align-items:center; gap:8px; margin:8px 0 4px; min-height:30px; flex-wrap:wrap}
  .racefav .lbl{font-size:12px; color:var(--dim)}
  .racefav .fchip{display:flex; align-items:center; gap:5px; background:rgba(245,196,81,.12);
     border:1px solid rgba(245,196,81,.45); border-radius:999px; padding:3px 9px 3px 4px; font-size:12px; color:var(--gold)}
  .racefav .fchip img{width:18px; height:18px; border-radius:50%}
  .arena{position:relative; height:520px; margin-top:4px; border-radius:16px;
         background:linear-gradient(180deg,#0d1626,#0a1322); border:1px solid var(--line); overflow:hidden}
  .arena .stagehdr{position:absolute; top:9px; font-size:11px; color:#7e8cab; transform:translateX(-50%); white-space:nowrap; text-align:center}
  .arena .stagehdr b{color:#cdd7ef}
  .kcol{position:absolute; top:32px; bottom:12px; width:1px;
        background:linear-gradient(180deg,transparent,rgba(255,255,255,.08),transparent); transition:opacity .3s}
  .kslot{position:absolute; width:28px; height:28px; border-radius:50%; border:1px dashed #2a3a59; transform:translate(-50%,-50%)}
  .ksub{position:absolute; transform:translateX(-50%); font-size:10px; color:#5b6884; white-space:nowrap}
  .cup{position:absolute; font-size:38px; filter:drop-shadow(0 0 14px rgba(245,196,81,.8)); animation:cg 2.4s ease-in-out infinite; transform-origin:center}
  @keyframes cg{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .kdim.dim{opacity:.16}
  .grow{position:absolute; left:10px; height:32px; display:flex; align-items:center; gap:7px; cursor:pointer;
        background:rgba(91,155,255,.06); border:1px solid #20304d; border-radius:9px; padding:0 7px 0 5px; transition:background .2s,border-color .2s}
  .grow.open{background:rgba(54,211,153,.10); border-color:#2f7d63}
  .grow .gb{font-size:11px; font-weight:700; color:#0b1220; background:var(--pre); border-radius:5px; padding:1px 5px}
  .grow .lf{position:relative; width:26px; height:26px; flex:0 0 26px}
  .grow .lf img{width:26px; height:26px; border-radius:50%; border:1.5px solid #2c3a58; background:#0d1626}
  .grow.fav .lf img{border-color:var(--gold); box-shadow:0 0 9px rgba(245,196,81,.8)}
  .grow .medal{position:absolute; left:-6px; top:-6px; font-size:11px}
  .grow .nm{font-size:12px; font-weight:600; white-space:nowrap}
  .grow .pt{font-size:11px; color:var(--gold); font-weight:700}
  .grow .st{font-size:13px; color:#5d6a88} .grow .st.on{color:var(--gold)}
  .grow .arrow{font-size:10px; color:var(--pre); transition:transform .25s} .grow.open .arrow{transform:rotate(90deg)}
  .member{position:absolute; width:32px; text-align:center; opacity:0; transform:translateX(-26px);
          transition:transform .4s cubic-bezier(.22,1,.36,1), opacity .35s}
  .member.show{opacity:1; transform:translateX(0)}
  .member .mf{position:relative; width:32px; height:32px; margin:0 auto; cursor:pointer}
  .member .mf img{width:32px; height:32px; border-radius:50%; border:2px solid #34425f; background:#0d1626}
  .member.q .mf img{border-color:var(--accent)} .member.q3 .mf img{border-color:var(--gold)}
  .member.fav .mf img{border-color:var(--gold); box-shadow:0 0 9px rgba(245,196,81,.85)}
  .member .rk{position:absolute; left:-7px; top:-7px; font-size:10px; font-weight:700; width:15px; height:15px; border-radius:50%;
          background:#1a2742; border:1px solid #34425f; line-height:14px; color:#9aa7c6}
  .member.q .rk{background:#0f3a2c; border-color:var(--accent); color:#7df0c4}
  .member .mstar{position:absolute; right:-6px; top:-7px; font-size:11px; cursor:pointer; color:#5d6a88}
  .member.fav .mstar{color:var(--gold)}
  .member .mc{font-size:9px; color:#9aa7c6; margin-top:2px; white-space:nowrap}
  .conn{position:absolute; height:2px; background:linear-gradient(90deg,#2f7d63,transparent); opacity:0; transition:opacity .3s}
  .conn.show{opacity:.6}
  /* mobile vertical climb */
  .climb{background:linear-gradient(180deg,#0d1626,#0a1322); border:1px solid var(--line);
         border-radius:16px; padding:14px 12px; margin-top:4px}
  .csummit{text-align:center; padding-bottom:6px}
  .csummit .cup{font-size:40px; filter:drop-shadow(0 0 14px rgba(245,196,81,.8)); animation:cg 2.4s ease-in-out infinite; display:inline-block}
  .csummit .clbl{font-size:12px; color:var(--gold); font-weight:700; margin-top:2px}
  .cstage{display:flex; align-items:center; gap:10px; padding:9px 4px; border-top:1px dashed #20304d}
  .cstage .cname{font-size:12px; color:#7e8cab; width:42px; flex:0 0 42px; text-align:right; font-weight:600}
  .cstage .cslots{display:flex; flex-wrap:wrap; gap:5px; align-items:center; flex:1}
  .cwait{font-size:11px; color:#5b6884}
  .cflag{width:26px; height:26px; border-radius:50%; border:1.5px solid #34425f}
  .cflag.elim{filter:grayscale(1); opacity:.45}
  .cgroupzone{background:rgba(91,155,255,.05); border-radius:10px; margin-top:6px; padding:8px}
  .cgroupzone .cgz{font-size:12px; color:#9be8c9; font-weight:600; margin-bottom:7px}
  .cgroups{display:flex; flex-wrap:wrap; gap:6px}
  .cg{display:flex; align-items:center; gap:5px; background:var(--card2); border:1px solid #20304d; border-radius:9px; padding:3px 8px 3px 4px; cursor:pointer}
  .cg.open{border-color:#2f7d63; background:rgba(54,211,153,.10)}
  .cg .cgb{font-size:10px; font-weight:700; color:#0b1220; background:var(--pre); border-radius:4px; padding:0 4px}
  .cg .cglf{position:relative; width:24px; height:24px}
  .cg .cglf img{width:24px; height:24px; border-radius:50%; border:1.5px solid #34425f}
  .cg .cglf img.favr{border-color:var(--gold); box-shadow:0 0 7px rgba(245,196,81,.8)}
  .cg .cgmd{position:absolute; left:-5px; top:-6px; font-size:10px}
  .cg .cgn{font-size:11px; color:#cdd7ef}
  .mgexpand{margin-top:8px}
  .mgcard{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:4px 10px 6px}
  .mgcard .mgt{display:flex; align-items:center; gap:8px; padding:5px 0; border-top:1px solid var(--line)}
  .mgcard .mgt:first-of-type{border-top:none}
  .mgcard .rk{font-size:12px; font-weight:700; width:16px; color:var(--dim)}
  .mgcard .mgt.q .rk{color:var(--accent)} .mgcard .mgt.q3 .rk{color:var(--gold)}
  .mgcard img{width:22px; height:22px; border-radius:50%}
  .mgcard .nm{flex:1; font-size:13px} .mgcard .pt{font-size:12px; font-weight:700; color:var(--gold)}
  .mgcard .ms{font-size:14px; color:#5d6a88; cursor:pointer} .mgcard .ms.on{color:var(--gold)}
  .cstart{text-align:center; font-size:11px; color:#6f7ea0; margin-top:8px; border-top:1px dashed #20304d; padding-top:8px}
</style>
</head>
<body>
<header>
  <h1>🏆 世界杯观赛时间表</h1>
  <div class="tz">⏰ 时区<select id="tzsel" class="tzsel"></select></div>
  <div class="tabs">
    <button data-v="today" class="on">今天</button>
    <button data-v="race">竞技场</button>
    <button data-v="all">全部赛程</button>
    <button data-v="results">往期成绩</button>
    <button data-v="standings">积分榜</button>
  </div>
  <div class="nav" id="daynav">
    <button id="prev">‹</button>
    <div class="day"><div class="d" id="dayLabel">—</div><div class="sub" id="daySub"></div></div>
    <button id="next">›</button>
    <button id="today">今天</button>
  </div>
</header>
<main>
  <div id="list"><div class="loading">加载中…</div></div>
  <div class="updated" id="updated"></div>
  <div class="src">数据来源 ESPN · 比分时间仅供参考</div>
</main>
<script>
const TZ_AUTO = (Intl.DateTimeFormat().resolvedOptions().timeZone) || "America/Edmonton";
let TZ = localStorage.getItem("wc_tz") || "auto";
function tzZone(){ return TZ==="auto" ? TZ_AUTO : TZ; }
const TZ_NAME={"America/Edmonton":"Alberta","America/Toronto":"多伦多","America/Vancouver":"温哥华",
  "America/New_York":"纽约","Asia/Shanghai":"北京","Asia/Tokyo":"东京","Europe/London":"伦敦","UTC":"UTC"};
function tzLabel(){ const z=tzZone(); return TZ_NAME[z] || z.split("/").pop().replace(/_/g," "); }
let view = "today";
let current = new Date();
let timer = null;
let allCache = null, allCacheAt = 0;
let STANDINGS = null, standAt = 0;

/* ============ data layer: browser talks to ESPN directly ============ */
const SB="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=";
const SUM="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=";
const STAND="https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings";

const ROUNDS=[
  ["小组赛","2026-06-11","2026-06-28"], ["32强","2026-06-28","2026-07-04"],
  ["16强","2026-07-04","2026-07-09"], ["八强","2026-07-09","2026-07-14"],
  ["半决赛","2026-07-14","2026-07-18"], ["季军赛","2026-07-18","2026-07-19"],
  ["决赛","2026-07-19","2026-08-01"],
];
function roundLabel(iso){
  const d=iso.slice(0,10);
  for(const [n,s,e] of ROUNDS){ if(d>=s && d<e) return n; }
  return "";
}
function pad(n){ return String(n).padStart(2,"0"); }
function ymdUTC(d){ return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate()); }

const _dayCache=new Map();
async function fetchUtcDate(yyyymmdd){
  const now=Date.now(), hit=_dayCache.get(yyyymmdd);
  if(hit && now-hit.t<15000) return hit.events;
  try{
    const d=await (await fetch(SB+yyyymmdd,{cache:"no-store"})).json();
    const ev=d.events||[]; _dayCache.set(yyyymmdd,{t:now,events:ev}); return ev;
  }catch(e){ return hit?hit.events:[]; }
}
function simplify(e){
  const comp=e.competitions[0], st=e.status||{}, t=st.type||{};
  let home=null, away=null;
  for(const c of (comp.competitors||[])){
    const side={name:c.team.shortDisplayName||c.team.displayName, full:c.team.displayName,
      logo:c.team.logo, score:c.score, winner:c.winner};
    if(c.homeAway==="home") home=side; else away=side;
  }
  const v=comp.venue||{}, a=v.address||{};
  return {id:e.id, date:e.date, home, away, state:t.state, detail:t.shortDetail,
    displayClock:st.displayClock, period:st.period, venue:v.fullName, city:a.city, round:roundLabel(e.date)};
}
function dedupeSimplify(rawArrays){
  const seen=new Set(), out=[];
  for(const arr of rawArrays) for(const e of arr){ if(!seen.has(e.id)){ seen.add(e.id); out.push(simplify(e)); } }
  return out;
}
async function matchesForDay(yyyymmdd){
  const base=new Date(Date.UTC(+yyyymmdd.slice(0,4), +yyyymmdd.slice(4,6)-1, +yyyymmdd.slice(6,8)));
  const days=[-1,0,1].map(k=>{ const x=new Date(base); x.setUTCDate(x.getUTCDate()+k); return ymdUTC(x); });
  return dedupeSimplify(await Promise.all(days.map(fetchUtcDate)));
}
async function allMatches(){
  const now=Date.now();
  if(allCache && now-allCacheAt<60000) return allCache;
  const days=[]; let d=new Date(Date.UTC(2026,5,11)); const end=new Date(Date.UTC(2026,6,19));
  while(d<=end){ days.push(ymdUTC(d)); d.setUTCDate(d.getUTCDate()+1); }
  const out=dedupeSimplify(await Promise.all(days.map(fetchUtcDate)));
  out.sort((a,b)=> a.date<b.date?-1:1);
  allCache=out; allCacheAt=now; return out;
}
const GOAL_KINDS=[["Penalty","点球"],["Own","乌龙"],["Header","头球"]];
function amToDec(ml){ ml=parseFloat(ml); if(!ml) return null;
  return Math.round((ml>0?1+ml/100:1+100/Math.abs(ml))*100)/100; }
const _detCache=new Map();
async function matchDetail(eid){
  const now=Date.now(), hit=_detCache.get(eid);
  if(hit && now-hit.t<(hit.completed?3600000:20000)) return hit.data;
  let d;
  try{ d=await (await fetch(SUM+eid,{cache:"no-store"})).json(); }
  catch(e){ return hit?hit.data:{goals:[],odds:null}; }
  const sidemap={}; let completed=false;
  try{
    const comp=d.header.competitions[0];
    completed=!!(comp.status&&comp.status.type&&comp.status.type.completed);
    for(const c of comp.competitors) sidemap[c.team.displayName]=c.homeAway;
  }catch(e){}
  const goals=[];
  for(const e of (d.keyEvents||[])){
    const tt=(e.type&&e.type.text)||"";
    const isGoal=e.scoringPlay||(tt.includes("Goal")&&!tt.includes("Disallow")&&!tt.includes("Missed"));
    if(!isGoal) continue;
    const parts=e.participants||[];
    const scorer=parts[0]&&parts[0].athlete?parts[0].athlete.displayName:null;
    const assist=parts[1]&&parts[1].athlete?parts[1].athlete.displayName:null;
    let kind=""; for(const [k,l] of GOAL_KINDS){ if(tt.includes(k)){ kind=l; break; } }
    const tname=(e.team&&e.team.displayName)||"";
    goals.push({minute:(e.clock&&e.clock.displayValue)||"", side:sidemap[tname]||"", team:tname, scorer, assist, kind});
  }
  let odds=null; const pc=d.pickcenter||[];
  if(pc.length){
    const o=pc[0];
    const home=amToDec(o.homeTeamOdds&&o.homeTeamOdds.moneyLine);
    const away=amToDec(o.awayTeamOdds&&o.awayTeamOdds.moneyLine);
    const draw=amToDec(o.drawOdds&&o.drawOdds.moneyLine);
    if(home||away||draw) odds={provider:o.provider&&o.provider.name, home, away, draw};
  }
  const data={goals, odds};
  _detCache.set(eid,{t:now, completed, data});
  return data;
}
async function fetchStandings(){
  let d;
  try{ d=await (await fetch(STAND,{cache:"no-store"})).json(); }
  catch(e){ return {groups:[], teamGroup:{}}; }
  const groups=[], teamGroup={};
  for(const ch of (d.children||[])){
    const name=ch.name||"", letter=(name.replace("Group ","").trim())||ch.abbreviation||"";
    const teams=[];
    for(const e of ((ch.standings&&ch.standings.entries)||[])){
      const st={}; let rank=99;
      for(const s of (e.stats||[])){ st[s.name]=s.displayValue; if(s.name==="rank") rank=s.value; }
      const tname=e.team.displayName; teamGroup[tname]=letter;
      teams.push({name:tname, abbr:e.team.abbreviation,
        logo:(e.team.logos&&e.team.logos[0]&&e.team.logos[0].href)||"",
        gp:st.gamesPlayed, w:st.wins, d:st.ties, l:st.losses, gd:st.pointDifferential, pts:st.points, rank});
    }
    teams.sort((a,b)=>(a.rank==null?99:a.rank)-(b.rank==null?99:b.rank));
    groups.push({letter, name, teams});
  }
  return {groups, teamGroup};
}

/* ============ standings helpers ============ */
async function ensureStandings(force){
  const now=Date.now();
  if(STANDINGS && !force && now-standAt<60000) return STANDINGS;

}

let raceOpen=null;
const KO_ORDER=["32强","16强","八强","半决赛","季军赛","决赛"];
function buildRaceInfo(){
  const real=new Set(Object.keys((STANDINGS&&STANDINGS.teamGroup)||{}));
  const info={}; real.forEach(n=> info[n]={reached:"group",eliminated:false,elimAt:null});
  // Only treat knockouts as begun once every group match is finished — otherwise
  // a few pre-listed bracket fixtures would wrongly grey out the field.
  const gm=(allCache||[]).filter(m=>m.round==="小组赛");
  const groupDone = gm.length>0 && gm.every(m=>m.state==="post");
  if(!groupDone) return {info, knockoutStarted:false};
  const ko=(allCache||[]).filter(m=>m.round&&m.round!=="小组赛");
  const nm=m=> m&&(m.full||m.name);
  for(const round of KO_ORDER){
    for(const m of ko.filter(x=>x.round===round)){
      const hn=nm(m.home), an=nm(m.away);
      if(real.has(hn)) info[hn].reached=round;
      if(real.has(an)) info[an].reached=round;
      if(m.state==="post"){
        let loser=null;
        if(m.home&&m.home.winner) loser=an; else if(m.away&&m.away.winner) loser=hn;
        if(loser&&real.has(loser)){ info[loser].eliminated=true; info[loser].elimAt=round; }
      }
    }
  }
  real.forEach(n=>{ if(info[n].reached==="group"){ info[n].eliminated=true; info[n].elimAt="小组赛"; } });
  return {info, knockoutStarted:true};
}

/* ============ formatting + rendering ============ */
function albertaParts(d){
  const f=new Intl.DateTimeFormat("en-CA",{timeZone:tzZone(),year:"numeric",month:"2-digit",day:"2-digit"});
  const p=Object.fromEntries(f.formatToParts(d).map(x=>[x.type,x.value]));
  return p.year+p.month+p.day;
}
function ymd(d){ return albertaParts(d); }
function dayHeading(iso){
  return new Intl.DateTimeFormat("zh-CN",{timeZone:tzZone(),month:"long",day:"numeric",weekday:"long"}).format(new Date(iso));
}
function dayLabelFromDate(d){
  return new Intl.DateTimeFormat("zh-CN",{timeZone:tzZone(),month:"long",day:"numeric",weekday:"short"}).format(d);
}
function albertaTime(iso){
  return new Intl.DateTimeFormat("en-CA",{timeZone:tzZone(),hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date(iso));
}
function albertaDayKey(iso){ return albertaParts(new Date(iso)); }
function statusBadge(m){
  if(m.state==="in") return `<span class="status live">● LIVE</span>`;
  if(m.state==="post") return `<span class="status post">完赛 FT</span>`;
  return `<span class="status pre">未开始</span>`;
}
function clockLine(m){
  if(m.state==="in"){
    const c=m.displayClock||(m.period?("第"+m.period+"节"):"进行中");
    return `<div class="clock">⏱ ${c}</div>`;
  }
  if(m.state==="post") return `<div class="clock ft">全场结束</div>`;
  return "";
}
function teamSide(t, side){
  const logo=t.logo?`<img src="${t.logo}" alt="">`:`<div style="width:28px"></div>`;
  const win=t.winner?" win":"";
  const ab=NAME2ABBR[t.full]||NAME2ABBR[t.name]||"";
  const star=isFav(ab)?`<span style="color:var(--gold);margin:0 3px">★</span>`:"";
  return `<div class="team ${side}${win}">${logo}<span class="nm">${star}${t.name||t.full||""}</span></div>`;
}
function scoreBlock(m){
  if(m.state==="pre"||!m.state) return `<div class="score dim">${albertaTime(m.date)}</div>`;
  return `<div class="score">${m.away.score??"0"}<span class="sep">:</span>${m.home.score??"0"}</div>`;

function card(m, showRound){
  const venue=[m.venue,m.city].filter(Boolean).join(" · ");
  const rb = showRound&&m.round?`<span class="rbadge">${m.round}</span>`:"";
  const gl = groupOf(m);

       data-home="${m.home.full||m.home.name||""}" data-away="${m.away.full||m.away.name||""}">
    <div class="toprow">
      <span class="kickoff">${albertaTime(m.date)} · ${tzLabel()}${rb}${gb}</span>
      ${statusBadge(m)}
    </div>

  let h="";

function groupByDay(events){
  const map=new Map();
  for(const m of events){
    const k=albertaDayKey(m.date);
    if(!map.has(k)) map.set(k,[]);
    map.get(k).push(m);
  }
  return map;
}
function renderGrouped(events, opts){
  if(events.length===0) return `<div class="empty">${opts.emptyMsg||"暂无比赛 ⚽"}</div>`;
  const map=groupByDay(events);
  let keys=[...map.keys()].sort();
  if(opts.reverse) keys.reverse();
  const todayK=ymd(new Date());
  let html="", first=true;
  for(const k of keys){
    const list=map.get(k), iso=list[0].date, isToday=k===todayK;
    const rounds=[...new Set(list.map(m=>m.round).filter(Boolean))].join(" / ");
    html+=`<div class="dhead${first?" first":""}${isToday?" todayhead":""}" data-day="${k}">
        <span class="dt">${dayHeading(iso)}${isToday?" · 今天":""}</span>
        <span class="rd">${rounds}</span></div>`;
    html+=list.map(m=>card(m,false)).join("");
    first=false;
  }
  return html;
}

    await renderRace();
  } else if(view==="today"){
    await renderToday();
  } else {
    list.innerHTML=`<div class="loading">加载完整赛程中…（首次稍慢）</div>`;
    let evs;
    try{ evs=await allMatches(); }
    catch(e){ list.innerHTML=`<div class="empty">加载失败，请下拉重试<br><span style="font-size:12px">${e}</span></div>`; return; }
    if(view==="results"){
      evs=evs.filter(m=>m.state==="post");
      list.innerHTML=renderGrouped(evs,{reverse:true, emptyMsg:"还没有已结束的比赛 ⚽"});
    } else {
      list.innerHTML=renderGrouped(evs,{});
      const todayK=ymd(new Date());
      const el=list.querySelector(`.dhead[data-day="${todayK}"]`);
      if(el) el.scrollIntoView({block:"start"});
    }
    stamp(evs.some(m=>m.state==="in"));
  }
  schedule();
}
async function renderToday(){
  const day=ymd(current);
  document.getElementById("dayLabel").textContent=dayLabelFromDate(current);
  document.getElementById("daySub").textContent = day===ymd(new Date())?"今天":"";
  const list=document.getElementById("list");
  try{
    let evs=(await matchesForDay(day)).filter(m=>albertaDayKey(m.date)===day);
    evs.sort((a,b)=>new Date(a.date)-new Date(b.date));
    list.innerHTML = evs.length? evs.map(m=>card(m,true)).join("")
      : `<div class="empty">这一天没有比赛 ⚽<br><span style="font-size:13px">用 ‹ › 切换日期，或看「全部赛程」</span></div>`;
    stamp(evs.some(m=>m.state==="in"));
  }catch(e){ document.getElementById("updated").textContent="刷新失败，重试中…"; }
}
function stamp(anyLive){
  const t=new Intl.DateTimeFormat("en-CA",{timeZone:tzZone(),hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(new Date());
  document.getElementById("updated").innerHTML=(anyLive?'<b>● 有比赛进行中</b> · ':'')+"更新于 "+t+" ("+tzLabel()+")";
}
function schedule(){
  clearTimeout(timer);
  if(view==="today" && ymd(current)===ymd(new Date())) timer=setTimeout(render,20000);
}
document.querySelectorAll(".tabs button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); view=b.dataset.v;
    if(view==="today") current=new Date();
    window.scrollTo(0,0);
    render();
  };
});
function shift(n){ const d=new Date(current); d.setDate(d.getDate()+n); current=d; render(); }
document.getElementById("prev").onclick=()=>shift(-1);
document.getElementById("next").onclick=()=>shift(1);
document.getElementById("today").onclick=()=>{ current=new Date(); render(); };
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) render(); });
let rzT=null;
window.addEventListener("resize",()=>{ if(view!=="race") return; clearTimeout(rzT); rzT=setTimeout(renderRace,200); });
function initTz(){
  const sel=document.getElementById("tzsel"); if(!sel) return;
  const opts=[["auto","自动（本地 "+TZ_AUTO.split("/").pop().replace(/_/g," ")+"）"],
    ["America/Edmonton","Alberta"],["America/Toronto","多伦多"],["America/Vancouver","温哥华"],
    ["America/New_York","纽约"],["Asia/Shanghai","北京/上海"],["Asia/Tokyo","东京"],
    ["Europe/London","伦敦"],["UTC","UTC"]];
  sel.innerHTML=opts.map(([v,l])=>`<option value="${v}"${v===TZ?" selected":""}>${l}</option>`).join("");
  sel.onchange=()=>{ TZ=sel.value; localStorage.setItem("wc_tz",TZ); render(); };
}
initTz();
render();
</script>
